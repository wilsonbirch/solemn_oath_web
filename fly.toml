# fly.toml app configuration file generated for solemn-oath on 2026-04-18T21:11:47-04:00
#
# See https://fly.io/docs/reference/configuration/ for information about how to use this file.
#

app = 'solemn-oath'
primary_region = 'yyz'

[build]
  # NEXT_PUBLIC_* must be set at Docker build time so they get inlined
  # into the client JS bundle. See ARGs in Dockerfile.
  # These are public values — safe to commit. Update via PR.
  [build.args]
    NEXT_PUBLIC_SANITY_PROJECT_ID = "2sg03x6i"
    NEXT_PUBLIC_SANITY_DATASET = "production"
    NEXT_PUBLIC_SANITY_API_VERSION = "2024-10-01"
    NEXT_PUBLIC_SITE_URL = "https://solemn-oath.fly.dev"

[http_service]
  internal_port = 3000
  force_https = true
  auto_stop_machines = 'stop'
  auto_start_machines = true
  min_machines_running = 0
  processes = ['app']

[[vm]]
  memory = '1gb'
  cpus = 1
  memory_mb = 1024
